<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avis de recherche</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">

        <div class="topbar">

            <div>
                <h1>Avis de recherche</h1>
                <p class="small">Ajout et affichage dans un tableau</p>
            </div>
            <div class="actions">
                <a href="/listeAvis.html" class="btn-link">Voir la liste complète des avis</a>
                <a href="/index.html" class="btn-link secondary">Retour à la liste principale</a>
            </div>
        </div>

        <div id="message"></div>

        <h2>Ajouter un avis de recherche</h2>
        <form id="formAjout">
            <input type="text" id="idAnimal" placeholder="ID de l'animal" required>
            <input type="text" id="typeSignalement" placeholder="Type de signalement" required>
            <input type="text" id="date" placeholder="Date de la disparition" required>
            <input type="image" id="photo" placeholder="Photo de l'animal" >
            <input type="text" id="description" placeholder="Description de l'animal">
            <button type="submit">Ajouter</button>
        </form>

        <h2>Ensemble des avis de recherches</h2>
        <table>
            <thead>
                <tr>
                    <th>ID Avis</th>
                    <th>Id Animal</th>
                    <th>Type de Signalement</th>
                    <th>Date</th>
                    <th>Photo</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyAvis"></tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/indexAvis.js"></script>

</body>
</html>
